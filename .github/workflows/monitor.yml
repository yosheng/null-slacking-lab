name: Hourly Commit Monitor

on:
  schedule:
    # 每小時執行一次 (例如 13:23, 14:23...)
    - cron: '23 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Monitor
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MM_WEBHOOK_URL: ${{ secrets.MM_WEBHOOK_URL }}
        run: python monitor_commits.py